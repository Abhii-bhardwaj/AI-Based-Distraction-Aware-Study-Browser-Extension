<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Focus Mode Active</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0e1a;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      color: #f1f5f9;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(239,68,68,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px;
      position: relative;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    h1 {
      font-size: 32px; font-weight: 700;
      background: linear-gradient(135deg, #ef4444, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    /* TIMER */
    .timer-section { margin-bottom: 36px; }
    .timer-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .timer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 52px; font-weight: 600;
      color: #ef4444;
      letter-spacing: 4px;
    }
    .timer.done { color: #10b981; }

    /* PROGRESS BAR */
    .progress-bg {
      width: 100%;
      height: 6px;
      background: #1f2937;
      border-radius: 3px;
      margin: 16px 0 36px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #ef4444, #f97316);
      transition: width 1s linear;
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 36px;
    }
    .stat {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 12px 8px;
    }
    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px; font-weight: 600;
      color: #6366f1;
    }
    .stat-label { font-size: 10px; color: #64748b; margin-top: 4px; }

    /* BREATHE EXERCISE */
    .breathe-section {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .breathe-title { font-size: 13px; color: #94a3b8; margin-bottom: 14px; }
    .breathe-circle {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(99,102,241,0.2);
      border: 2px solid #6366f1;
      margin: 0 auto;
      animation: breatheCircle 4s ease-in-out infinite;
    }
    @keyframes breatheCircle {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.4); opacity: 1; }
    }
    .breathe-text { font-size: 11px; color: #64748b; margin-top: 10px; }

    .btn {
      padding: 12px 28px;
      background: #1f2937;
      border: 1px solid #374151;
      color: #f1f5f9;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
    }
    .btn:hover { background: #374151; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.active { background: #10b981; border-color: #10b981; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="icon">🧘</div>
    <h1>Focus Mode Active</h1>
    <p class="subtitle">
      Your distraction score hit critical levels.<br>
      Take a break, breathe, and come back focused.
    </p>

    <div class="timer-section">
      <div class="timer-label">Cooldown Timer</div>
      <div class="timer" id="timerDisplay">05:00</div>
    </div>

    <div class="progress-bg">
      <div class="progress-fill" id="progressFill" style="width: 100%"></div>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-val" id="focusScoreVal">—</div>
        <div class="stat-label">Focus Score</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="dlsVal">—</div>
        <div class="stat-label">DLS Score</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="streakVal">—</div>
        <div class="stat-label">Best Streak</div>
      </div>
    </div>

    <div class="breathe-section">
      <div class="breathe-title">While you wait — Try box breathing</div>
      <div class="breathe-circle"></div>
      <div class="breathe-text">Inhale 4s → Hold 4s → Exhale 4s → Hold 4s</div>
    </div>

    <button class="btn" id="goBackBtn" disabled>
      ⏳ Please wait...
    </button>
  </div>

<script>
  const COOLDOWN = 5 * 60; // 5 minutes in seconds
  let remaining = COOLDOWN;
  const btn = document.getElementById('goBackBtn');

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }

  const interval = setInterval(() => {
    remaining--;
    document.getElementById('timerDisplay').textContent = formatTime(remaining);
    const pct = (remaining / COOLDOWN) * 100;
    document.getElementById('progressFill').style.width = pct + '%';

    if (remaining <= 0) {
      clearInterval(interval);
      document.getElementById('timerDisplay').textContent = '✓ Done!';
      document.getElementById('timerDisplay').classList.add('done');
      btn.textContent = '✅ Go Back to Studying';
      btn.disabled = false;
      btn.classList.add('active');
    }
  }, 1000);

  btn.addEventListener('click', () => {
    // TASK-007: Track override as non-compliance
    chrome.runtime.sendMessage({ type: 'OVERRIDE_BLOCK', url: window.location.href });
    history.back();
  });

  // Load stats
  chrome.storage.local.get('liveData', ({ liveData }) => {
    if (!liveData) return;
    document.getElementById('focusScoreVal').textContent = liveData.focusScore ?? '—';
    document.getElementById('dlsVal').textContent = Math.round((liveData.currentDLS || 0) * 100) + '%';
    document.getElementById('streakVal').textContent = (liveData.longestStreak || 0) + 'm';
  });
</script>
</body>
</html>
